# FTO-ADMET build manifest - the canonical task DAG. Human-edited source of truth.
# state.py reads this to compute readiness; run.sh iterates it; STATE.json tracks status.
#
# kind: bootstrap | core | gate | model-rule | model-code | model-legacy | model-heavy
# | model-api | sop | aggregator | aggregator-deferred
# autonomy: high -> run unattended, low review expected
# review -> run unattended but flagged for a human read (traps: units/direction/scales)
# human -> requires Aaran / an authenticated or manual session; loop quarantines to NEEDS_AARAN
# deps: task ids that must be DONE before this becomes ready
# test: (core/gate/aggregator) pytest target the gate runs
#
# Every task has a spec file tasks/<id>.md. Tasks are authored in later stages; the DAG is complete now.

project: fto-admet
attempt_cap: 3

phases:
  - id: -1
    name: bootstrap
  - id: 0
    name: core
  - id: 1
    name: pattern-proof
  - id: 2
    name: models
  - id: 3
    name: aggregators
  - id: 4
    name: final

tasks:
  # ---- Phase -1: bootstrap (human-gated: /scratch request + box config) --------------------------
  - id: t00-bootstrap-box
    phase: -1
    kind: bootstrap
    autonomy: human
    deps: []

  # ---- Phase 0 prerequisite: the root/core env (laptop; multi-platform lock) ---------------------
  - id: t00b-core-env
    phase: 0
    kind: core
    autonomy: high
    deps: [t00-bootstrap-box]
    test: tests/test_env.py

  # ---- Phase 0: core (laptop; no GPU) ------------------------------------------------------------
  - id: t01-core-config
    phase: 0
    kind: core
    autonomy: high
    deps: [t00b-core-env]
    test: tests/test_config.py
  - id: t02-core-models
    phase: 0
    kind: core
    autonomy: high
    deps: [t00b-core-env]
    test: tests/test_models.py
  - id: t03-core-schemas
    phase: 0
    kind: core
    autonomy: review # reserves uncertainty/AD fields (CLAUDE.md §3)
    deps: [t02-core-models]
    test: tests/test_schemas.py
  - id: t04-core-registry
    phase: 0
    kind: core
    autonomy: review
    deps: [t02-core-models, t03-core-schemas]
    test: tests/test_registry.py
  - id: t05-core-gpu
    phase: 0
    kind: core
    autonomy: high
    deps: [t01-core-config]
    test: tests/test_gpu.py
  - id: t06-core-ledger
    phase: 0
    kind: core
    autonomy: high
    deps: [t01-core-config]
    test: tests/test_ledger.py
  - id: t07-core-dispatch
    phase: 0
    kind: core
    autonomy: review
    deps: [t04-core-registry, t03-core-schemas, t05-core-gpu, t06-core-ledger]
    test: tests/test_dispatch.py
  - id: t08-core-run
    phase: 0
    kind: core
    autonomy: high
    deps: [t07-core-dispatch, t04-core-registry]
    test: tests/test_run.py
  - id: t09-gate-core
    phase: 0
    kind: gate
    autonomy: review # LOCKS the contract before the model swarm starts
    deps: [t01-core-config, t02-core-models, t03-core-schemas, t04-core-registry,
           t05-core-gpu, t06-core-ledger, t07-core-dispatch, t08-core-run]
    test: tests/ -m "not model"

  # ---- Phase 1: pattern proof (box) --------------------------------------------------------------
  - id: t10-model-rdkit_crippen
    phase: 1
    kind: model-rule
    autonomy: review # walking skeleton: first end-to-end incl ledger + smoke
    deps: [t09-gate-core]
  - id: t11-model-pksmart
    phase: 1
    kind: model-code
    autonomy: review # first isolated env; proves subprocess + fold-error (uncertainty schema)
    deps: [t10-model-rdkit_crippen]
  - id: t12-gate-phase1
    phase: 1
    kind: gate
    autonomy: review
    deps: [t11-model-pksmart]
    test: tests/test_phase1_integration.py

  # ---- Phase 2: rule cluster (parallel-safe, high autonomy) --------------------------------------
  - id: t13-model-sfi
    phase: 2
    kind: model-rule
    autonomy: review # needs cLogD/pKa: DEFERRED source -> placeholder (F-13)
    deps: [t12-gate-phase1]
  - id: t14-model-bbb_score
    phase: 2
    kind: model-rule
    autonomy: review # needs pKa (F-13)
    deps: [t12-gate-phase1]
  - id: t15-model-cns_mpo
    phase: 2
    kind: model-rule
    autonomy: review # needs pKa (F-13)
    deps: [t12-gate-phase1]
  - id: t16-model-boiled_egg
    phase: 2
    kind: model-rule
    autonomy: high # point-in-polygon; TPSA=x, WLOGP=y (do not swap)
    deps: [t12-gate-phase1]
  - id: t17-model-pains_brenk
    phase: 2
    kind: model-rule
    autonomy: high
    deps: [t12-gate-phase1]
  - id: t18-model-toxicophores
    phase: 2
    kind: model-rule
    autonomy: high # pick + document ONE alert catalog
    deps: [t12-gate-phase1]
  - id: t19-model-lipinski_veber_qed
    phase: 2
    kind: model-rule
    autonomy: high
    deps: [t12-gate-phase1]
  - id: t20-model-sascore
    phase: 2
    kind: model-rule
    autonomy: high # vendor sascorer.py + fpscores.pkl.gz from RDKit Contrib
    deps: [t12-gate-phase1]

  # ---- Phase 2: modern-stack code models ---------------------------------------------------------
  - id: t21-model-admet_ai
    phase: 2
    kind: model-code
    autonomy: review # v2; EXCLUDE VDss + half-life heads; clearance low-weight
    deps: [t12-gate-phase1]
  - id: t22-model-openadmet
    phase: 2
    kind: model-code
    autonomy: review # S3 weights; OADMET_PRED/STD (native sigma); reference only
    deps: [t12-gate-phase1]
  - id: t23-model-ctoxpred2
    phase: 2
    kind: model-code
    autonomy: review # hERG = 0/1 vote + %-string confidence (NOT a probability)
    deps: [t12-gate-phase1]
  - id: t24-model-cardiogenai
    phase: 2
    kind: model-code
    autonomy: review # discriminative keys with spaces; generative GATED on Kunhuan (scaffold)
    deps: [t12-gate-phase1]
  - id: t25-model-smartcyp
    phase: 2
    kind: model-code
    autonomy: review # Python/RDKit, NO openjdk; re-verify 3.0 header (legacy = template)
    deps: [t12-gate-phase1]
  - id: t26-model-fame3r
    phase: 2
    kind: model-code
    autonomy: review # sklearn predict_proba[:,1]; FAME3RScore AD; no 0.3 threshold
    deps: [t12-gate-phase1]
  - id: t27-model-swissadme
    phase: 2
    kind: model-code
    autonomy: review # reconstruct WLOGP/MLOGP/XLOGP3 3-lens; lose iLOGP+SILICOS-IT
    deps: [t12-gate-phase1]
  - id: t28-model-pgp
    phase: 2
    kind: model-code
    autonomy: high # reads generalist Pgp_Broccatelli field; narrow-domain flag
    deps: [t21-model-admet_ai]

  # ---- Phase 2: legacy + heavy runtimes (blocked-expected; serialize on the box) -----------------
  - id: t29-model-bayesherg
    phase: 2
    kind: model-legacy
    autonomy: review # py3.6 + DGL + old torch on CUDA 575; CC-BY-NC weights; alea/epis
    deps: [t12-gate-phase1]
  - id: t30-model-cardiotox_net
    phase: 2
    kind: model-legacy
    autonomy: review # py3.7.7 + old TF; bare P(block) array; Morgan on-bits <= 93
    deps: [t12-gate-phase1]
  - id: t31-model-rascore
    phase: 2
    kind: model-legacy
    autonomy: review # 2021 TF/sklearn pins; health-check first
    deps: [t12-gate-phase1]
  - id: t32-model-aizynthfinder
    phase: 2
    kind: model-heavy
    autonomy: review # stock set config; is_solved/top_score; shortlist only
    deps: [t12-gate-phase1]
  - id: t33-model-opera
    phase: 2
    kind: model-heavy
    autonomy: review # MATLAB MCR + Java; ISOLATE OUTSIDE pixi; _pred/AD/AD_index/Conf_index
    deps: [t12-gate-phase1]
  - id: t34-model-pbpk
    phase: 2
    kind: model-heavy
    autonomy: review # R 4.x + .NET 8 + OSP; POINTER; out-of-band; SOP-like README
    deps: [t12-gate-phase1]

  # ---- Phase 2: API adapters (partial -> NEEDS_AARAN for the live lookup) -------------------------
  - id: t35-model-admetlab3
    phase: 2
    kind: model-api
    autonomy: human # 119 CSV column names = one live /api/admetCSV call
    deps: [t12-gate-phase1]
  - id: t36-model-ochem_ppb
    phase: 2
    kind: model-api
    autonomy: human # numeric modelId = authenticated OCHEM UI lookup; output %-bound/desalted
    deps: [t12-gate-phase1]

  # ---- Phase 2: web-only SOPs (README only) ------------------------------------------------------
  - id: t37-sop-watanabe_renal
    phase: 2
    kind: sop
    autonomy: high # DruMAP; batch in ONE session with t38 + CLint/Fa/fu,brain/Kp,uu
    deps: [t12-gate-phase1]
  - id: t38-sop-watanabe_pgp_brain
    phase: 2
    kind: sop
    autonomy: high # DruMAP same session as t37
    deps: [t12-gate-phase1]
  - id: t39-sop-protox
    phase: 2
    kind: sop
    autonomy: high # tox.charite.de; SELECT "ALL models"; shortlist confirmatory
    deps: [t12-gate-phase1]

  # ---- Phase 3: aggregators (run in core env; depend on contributing models) ---------------------
  - id: t40-agg-lipophilicity
    phase: 3
    kind: aggregator
    autonomy: review # logP vs logD (F-12); spread across lenses = flag; anchor logD~1
    deps: [t10-model-rdkit_crippen, t33-model-opera, t27-model-swissadme]
    test: endpoints/lipophilicity/test_aggregate.py
  - id: t41-agg-solubility
    phase: 3
    kind: aggregator
    autonomy: review # SFI lower=better INVERSION vs generalist
    deps: [t13-model-sfi, t21-model-admet_ai]
    test: endpoints/solubility/test_aggregate.py
  - id: t42-agg-metabolism
    phase: 3
    kind: aggregator
    autonomy: review # SMARTCyp vs FAME3R opposite directions -> ordinal co-rank (F-2)
    deps: [t25-model-smartcyp, t26-model-fame3r, t21-model-admet_ai]
    test: endpoints/metabolism/test_aggregate.py
  - id: t43-agg-clearance
    phase: 3
    kind: aggregator
    autonomy: review # 4 incompatible units (F-3): NEVER combine; decompose renal/hepatic/agg
    deps: [t11-model-pksmart, t21-model-admet_ai, t33-model-opera, t37-sop-watanabe_renal]
    test: endpoints/clearance/test_aggregate.py
  - id: t44-agg-distribution
    phase: 3
    kind: aggregator
    autonomy: review # incompatible scales (F-4): map to penetrant/borderline/non + vote
    deps: [t14-model-bbb_score, t15-model-cns_mpo, t16-model-boiled_egg,
           t28-model-pgp, t38-sop-watanabe_pgp_brain]
    test: endpoints/distribution/test_aggregate.py
  - id: t45-agg-ppb
    phase: 3
    kind: aggregator
    autonomy: review # normalize to fraction bound; OPERA FuB -> 1-FuB
    deps: [t36-model-ochem_ppb, t21-model-admet_ai, t33-model-opera]
    test: endpoints/ppb/test_aggregate.py
  - id: t46-agg-permeability
    phase: 3
    kind: aggregator
    autonomy: high # aggregate-only: Caco2/HIA/PAMPA/%F/Pgp + BOILED-Egg HIA bool
    deps: [t21-model-admet_ai, t16-model-boiled_egg]
    test: endpoints/permeability/test_aggregate.py
  - id: t47-agg-structural_alerts
    phase: 3
    kind: aggregator
    autonomy: high
    deps: [t17-model-pains_brenk]
    test: endpoints/structural_alerts/test_aggregate.py
  - id: t48-agg-synthesizability
    phase: 3
    kind: aggregator
    autonomy: review # escalating tier ladder = the signal; report tier not one scalar
    deps: [t20-model-sascore, t31-model-rascore, t32-model-aizynthfinder]
    test: endpoints/synthesizability/test_aggregate.py
  - id: t49-agg-toxicity
    phase: 3
    kind: aggregator
    autonomy: review # LD50 scales differ (F-5): bulk panel vs ProTox shortlist; keep separate
    deps: [t21-model-admet_ai, t35-model-admetlab3, t18-model-toxicophores, t39-sop-protox]
    test: endpoints/toxicity/test_aggregate.py
  - id: t50-agg-druglikeness
    phase: 3
    kind: aggregator
    autonomy: high
    deps: [t19-model-lipinski_veber_qed]
    test: endpoints/druglikeness/test_aggregate.py
  - id: t51-agg-triage
    phase: 3
    kind: aggregator
    autonomy: review # cross-cutting generalist outputs consumed by many endpoints
    deps: [t21-model-admet_ai, t35-model-admetlab3, t22-model-openadmet]
    test: endpoints/triage/test_aggregate.py
  - id: t52-agg-herg
    phase: 3
    kind: aggregator-deferred
    autonomy: human # GATE MATH DEFERRED: scaffold + DEFERRED marker only, no real weights
    deps: [t29-model-bayesherg, t30-model-cardiotox_net, t23-model-ctoxpred2,
           t24-model-cardiogenai, t21-model-admet_ai]
    test: endpoints/herg/test_aggregate.py

  # ---- Phase 4: final gate -----------------------------------------------------------------------
  - id: t53-gate-final
    phase: 4
    kind: gate
    autonomy: review
    deps: [t40-agg-lipophilicity, t41-agg-solubility, t42-agg-metabolism, t43-agg-clearance,
           t44-agg-distribution, t45-agg-ppb, t46-agg-permeability, t47-agg-structural_alerts,
           t48-agg-synthesizability, t49-agg-toxicity, t50-agg-druglikeness, t51-agg-triage]
    test: tests/ -m "not model"

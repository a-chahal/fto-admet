feature: hERG_block
endpoint: herg
priority: high

target:
  name: hERG_pIC50
  units: pIC50
  transform: identity
  dataset: chembl_temporal_herg   # NO clean legacy set; temporal ChEMBL patch-clamp slice only
  label_column: pIC50
  note: >
    hERG is the most-contaminated endpoint. Cut a ChEMBL v34/v35 manual patch-clamp slice
    (assay_type=B, IC50, standard_units=nM), temporal after training cutoffs, then subtract ALL unions.

# A real 4-architecture fusion, each source calibrated LINEARLY to the pIC50 target:
#   admet_ai (chemprop), bayesherg (graph-NN), cardiotox_net (meta-ensemble) emit P(block) [0,1] -> the
#   linear fit maps each prob monotonically to pIC50 (ranking within a source preserved); cardiogenai emits
#   pIC50 NATIVELY (same units as the target). cardiogenai's pIC50 is read from the source's raw field (the
#   aggregator carries it as value=None on the P(block) gate scale, F-1; the trainer + core.fusion fall back
#   to raw when value is None), so it enters the fit as a near-identity linear source. This tests whether
#   combining four independent architectures beats the best single hERG predictor.
sources:
  - {model: admet_ai,       calibration: linear}
  - {model: bayesherg,      calibration: linear}
  - {model: cardiotox_net,  calibration: linear}
  - {model: cardiogenai,    calibration: linear, from_raw: true}   # native pIC50 read from raw (aggregator carries value=None on the P(block) scale, F-1)

fusion: {method: ridge, regularization: 0.5}
uncertainty:
  method: normalized_conformal
  alpha: 0.1
  scale: disagreement_std          # bayesherg native alea/epis can later feed native_sigma instead
  scale_floor: 0.1

leakage:
  exclude_models: [admet_ai, bayesherg, cardiotox_net, cardiogenai]
  note: >
    subtract TDC hERG + BayeshERG (14,322 fine-tune + hERGCentral pretrain) + CardioTox (train + Test-I/II/III)
    + CardioGenAI/CToxPred train+eval by InChIKey, on top of the >=2021 temporal cut. Temporal slice only.

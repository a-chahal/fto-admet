feature: pgp_efflux
endpoint: distribution
priority: high         # drives brain Kp,uu

target:
  name: mdr1_mdck_log_er
  units: log
  transform: identity           # Biogen column is already LOG MDR1-MDCK ER
  dataset: biogen_adme_2023
  loader_kwargs: {target: mdr1_mdck_er}
  note: Biogen MDR1-MDCK efflux ratio - a clean, continuous, non-ChEMBL match; Broccatelli is binary (no ER contamination).

# admet_ai Pgp_Broccatelli is a probability; calibrate it LINEARLY onto the continuous log ER (single source).
sources:
  - {model: admet_ai, calibration: linear}

fusion: {method: linear, regularization: 0.0}
uncertainty: {method: normalized_conformal, alpha: 0.1, scale: constant, constant_width: 0.5}

leakage:
  exclude_models: [admet_ai]
  note: subtract TDC Pgp_Broccatelli by InChIKey (binary; molecule identities only).

feature: skin_reaction
endpoint: toxicity
priority: medium

target:
  name: skin_sensitization
  units: probability
  transform: logit               # binary target; the fit is logistic (classification path)
  dataset: niceatm_llna
  label_column: label
  max_n: 5000                    # cap the screen (post-leakage); test set stays large enough for a tight AUC CI
  note: >
    Binary classification head: calibrate admet_ai's skin_reaction probability to the measured niceatm_llna label.
    fusion.method logistic -> AUC / Spearman / Brier + a logistic link (probability output), no conformal
    interval. Single-source, so this is validation (discrimination) of the admet_ai head, not fusion.

sources:
  - {model: admet_ai, calibration: logistic}

fusion: {method: logistic}
uncertainty: {method: none}

leakage:
  exclude_models: [admet_ai]
  note: subtract TDC Skin_Reaction by InChIKey (the collected set is its superset; survivors = molecules admet_ai never trained on).

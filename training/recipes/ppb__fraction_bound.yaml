feature: fraction_bound
endpoint: ppb
priority: high

target:
  name: human_fraction_bound
  units: fraction_bound
  transform: identity            # loader already converts LOG(% unbound) -> fraction_bound (0-1)
  dataset: biogen_adme_2023
  loader_kwargs: {target: ppb}
  note: >
    Biogen human PPB (LOG % unbound) converted to fraction_bound to match the aggregator's feature. Trained
    as a real 2-source ensemble (admet_ai + opera). ochem_ppb is dropped from TRAINING (slow live API + not
    in the exclusion index); it stays in the aggregator but is not in this spec.

sources:                                       # a real 3-source ensemble (fault-tolerant screening handles bad molecules)
  - {model: admet_ai,  calibration: linear}
  - {model: ochem_ppb, calibration: linear}
  - {model: opera,     calibration: linear}    # opera FuB already inverted to fraction_bound upstream

fusion: {method: nnls, regularization: 0.1}
uncertainty: {method: normalized_conformal, alpha: 0.1, scale: disagreement_std, scale_floor: 0.02}

leakage:
  exclude_models: [admet_ai, opera, ochem_ppb]  # ochem is an index GAP -> flagged + stamped, not subtractable
  note: subtract TDC PPBR_AZ + OPERA FuB by InChIKey; ochem_ppb residual contamination flagged on the spec.

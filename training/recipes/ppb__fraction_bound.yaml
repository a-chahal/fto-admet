feature: fraction_bound
endpoint: ppb
priority: high

target:
  name: human_fraction_bound
  units: fraction_bound
  transform: identity            # loader already converts LOG(% unbound) -> fraction_bound (0-1)
  dataset: biogen_adme_2023
  loader_kwargs: {target: ppb}
  note: >
    Biogen human PPB (LOG % unbound) converted to fraction_bound to match the aggregator's feature. opera was
    dropped from TRAINING (screening cost; NNLS empirically zeroed its weight in the committed 3-source spec
    - structurally redundant with admet_ai). It stays a live inference source in the aggregator. ochem_ppb is
    kept as a training source but is an exclusion-index GAP (residual contamination flagged on the spec).

sources:                                       # admet_ai + ochem_ppb (opera dropped from training)
  - {model: admet_ai,  calibration: linear}
  - {model: ochem_ppb, calibration: linear}

fusion: {method: nnls, regularization: 0.1}
uncertainty: {method: normalized_conformal, alpha: 0.1, scale: disagreement_std, scale_floor: 0.02}

leakage:
  exclude_models: [admet_ai, ochem_ppb]         # ochem is an index GAP -> flagged + stamped, not subtractable
  note: subtract TDC PPBR_AZ by InChIKey; ochem_ppb residual contamination flagged on the spec. (opera dropped from training.)

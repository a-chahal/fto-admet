feature: fraction_bound
endpoint: ppb
priority: high

target:
  name: human_fraction_bound
  units: fraction_bound
  transform: identity            # loader already converts LOG(% unbound) -> fraction_bound (0-1)
  dataset: biogen_adme_2023
  loader_kwargs: {target: ppb}
  note: >
    Biogen human PPB (LOG % unbound) converted to fraction_bound to match the aggregator's feature.
    Single-source admet_ai. Both extra sources were tested and add nothing: opera was NNLS-zeroed in the
    old 3-source spec, and adding ochem_ppb gave +0.002 R2 on the scaffold split (noise) while ochem is a
    slow live API - so the operative model is single-source. Both stay live inference sources in the
    aggregator (raw values on the card); they are just not in this trained spec. This is calibration + a
    conformal interval, not fusion.

sources:                                       # single-source admet_ai (opera + ochem tested, no uplift)
  - {model: admet_ai,  calibration: linear}

fusion: {method: linear, regularization: 0.0}
uncertainty: {method: normalized_conformal, alpha: 0.1, scale: constant, constant_width: 0.1}

leakage:
  exclude_models: [admet_ai]
  note: subtract TDC PPBR_AZ by InChIKey. (opera + ochem dropped from training: tested, no uplift.)

feature: fraction_bound
endpoint: ppb
priority: high

target:
  name: human_fraction_bound
  units: fraction_bound
  transform: identity            # loader already converts LOG(% unbound) -> fraction_bound (0-1)
  dataset: biogen_adme_2023
  loader_kwargs: {target: ppb}
  note: >
    Biogen human PPB (LOG % unbound) converted to fraction_bound to match the aggregator's feature. Trained
    as a real 2-source ensemble (admet_ai + opera). ochem_ppb is dropped from TRAINING (slow live API + not
    in the exclusion index); it stays in the aggregator but is not in this spec.

sources:
  - {model: admet_ai, calibration: linear}   # single source: opera is flaky in bulk training screens, ochem is a slow live API

fusion: {method: linear, regularization: 0.0}
uncertainty: {method: normalized_conformal, alpha: 0.1, scale: constant, constant_width: 0.1}

leakage:
  exclude_models: [admet_ai]
  note: subtract TDC PPBR_AZ by InChIKey. (opera/ochem not trained on here; multi-source uplift deferred to logD/hERG.)

feature: hepatocyte_clint
endpoint: clearance
priority: medium

target:
  name: hlm_microsomal_clint     # SIGNED-OFF sibling: Biogen HLM microsomal, not hepatocyte
  units: log_mL_min_kg
  transform: identity            # Biogen column is already LOG HLM_CLint
  dataset: biogen_adme_2023
  loader_kwargs: {target: hlm_clint}
  note: >
    Accepted the clean sibling (microsomal CLint) over exact-matrix hepatocyte, per sign-off. Trained as a
    single-source admet_ai fit calibrated to microsomal CLint. opera was dropped from TRAINING (screening
    it costs hours and it added no uplift here); it stays a live inference source in the aggregator. Re-add
    + retrain WITH opera later to formally confirm redundancy.

sources:                                       # single-source admet_ai (opera dropped from training)
  - {model: admet_ai, calibration: linear}

fusion: {method: nnls, regularization: 0.1}
uncertainty: {method: normalized_conformal, alpha: 0.1, scale: constant, constant_width: 0.3}

leakage:
  exclude_models: [admet_ai]
  note: subtract TDC Clearance_Hepatocyte_AZ by InChIKey. (opera dropped from training.)

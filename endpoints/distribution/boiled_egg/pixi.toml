# Isolated env for the boiled_egg (BOILED-Egg, Daina & Zoete 2016) rule adapter. ONE ENV PER MODEL
# (CLAUDE.md §0/§3): pure RDKit, no upstream weights, no GPU, no CUDA. The membership test is a
# self-contained ray-casting point-in-polygon (no shapely), so rdkit is the only dependency, same
# intent as the t10 rdkit_crippen / t14 bbb_score / t15 cns_mpo templates.
#
# This file is INTENT only (channels + deps). The exact resolved env is `pixi.lock`, which is SOLVED ON
# THE BOX (Linux + conda-forge) and committed (CLAUDE.md §0). macOS cannot resolve the per-model envs,
# so `platforms` is linux-64 only and the lock carries a real `linux-64` section (the gate checks it to
# catch a fabricated/laptop-solved lock).
[project]
name = "boiled_egg"
version = "0.1.0"
description = "BOILED-Egg (Daina & Zoete 2016: point-in-polygon in TPSA x WLOGP) rule adapter; serves distribution (BBB) + permeability (HIA)"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = "3.11.*"
rdkit = "*"

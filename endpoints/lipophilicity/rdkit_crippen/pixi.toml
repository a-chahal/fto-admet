# Isolated env for the rdkit_crippen adapter - the walking-skeleton model and the template every later
# model copies. ONE ENV PER MODEL (CLAUDE.md §0/§3): pure RDKit, no upstream weights, no GPU, no CUDA.
#
# This file is INTENT only (channels + deps). The exact resolved env is `pixi.lock`, which is SOLVED ON
# THE BOX (Linux + conda-forge) and committed (CLAUDE.md §0). macOS cannot resolve the per-model envs,
# so `platforms` is linux-64 only and the lock carries a real `linux-64` section (the gate checks it to
# catch a fabricated/laptop-solved lock).
[project]
name = "rdkit_crippen"
version = "0.1.0"
description = "RDKit Crippen logP/MR adapter (SwissADME WLOGP lens) for the lipophilicity endpoint"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = "3.11.*"
rdkit = "*"

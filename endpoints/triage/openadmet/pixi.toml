# Isolated env for the openadmet adapter (t22): the OpenADMET modeling framework run for INFERENCE of its
# released baseline CYP models. ONE ENV PER MODEL (CLAUDE.md §0/§3). GPU OPTIONAL (requires_gpu=False):
# the adapter runs on CPU by default and honors --gpu N; reference role does not warrant holding a device.
#
# This file is INTENT only. The exact resolved env is `pixi.lock`, SOLVED ON THE BOX (Linux; conda-forge +
# PyPI incl. git sources) and committed (CLAUDE.md §0). macOS/laptop CANNOT resolve this stack, so
# `platforms` is linux-64 only and the lock carries a real `linux-64` section with package hashes + pinned
# git commits (the gate checks the linux-64 section to catch a fabricated/laptop-solved lock).
#
# WHY THIS SET (verified by box-solving, not guessed):
# - `openadmet-models` is a git package (no PyPI release); it needs its sibling `openadmet-toolkit`, the
#   OpenADMET `molfeat` fork (imported unconditionally by openadmet.models.features.pairwise), `nepare`
#   (the neural-pairwise-regression dist name is `nepare`, NOT the repo name), `useful-rdkit-utils`, and
#   `phx-class-registry` (the model/transform registry). These mirror the upstream conda-env pip section.
# - `pydantic` + `email-validator` are import-time deps of openadmet-models' spec layer (pydantic
#   EmailStr) that the upstream conda yaml pulls transitively; pinned here because a bare openadmet install
#   ImportErrors without them.
# - conda-forge base: chemprop (>=2.1.1, the CheMeleon-capable line), pytorch (CPU build is fine for a
#   reference model), pytorch-lightning (<=2.6.1, upstream bound), rdkit, numpy/pandas, intake +
#   intake-parquet + zarr (the anvil recipe/data layer), datamol, loguru/rich, scikit-learn, joblib,
#   tabulate, mordredcommunity.
# - `boto3` is deliberately OMITTED: it is only used by comparison/posthoc.py `_download_s3_dir` (the
#   internal training-dir COMPARISON workflow), never by the inference path this adapter uses, and its
#   conda botocore pin conflicts with the molfeat fork's aiobotocore requirement. Released baseline weights
#   are fetched out-of-band from HuggingFace git-lfs (see README), not S3.
#
# The released baseline model weights are NOT vendored here (they are ~40 MB LFS blobs); they are fetched
# into the /zfs cache and pointed at via the OPENADMET_MODEL_DIRS env var (README + run.py).
[workspace]
name = "openadmet"
version = "0.1.0"
description = "OpenADMET released baseline CYP models (reference, NOT a gate authority) adapter for triage"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.12,<3.14"
chemprop = ">=2.1.1"
pytorch = "*"
pytorch-lightning = "<=2.6.1"
rdkit = "*"
numpy = "*"
pandas = "*"
loguru = "*"
rich = "*"
scikit-learn = "*"
intake = "*"
intake-parquet = "*"
zarr = ">=3.0.0"
datamol = "*"
joblib = "*"
tabulate = "*"
mordredcommunity = "*"
pip = "*"
pydantic = "*"
email-validator = "*"

[pypi-dependencies]
phx-class-registry = "*"
openadmet-models = { git = "https://github.com/OpenADMET/openadmet-models.git", branch = "main" }
openadmet-toolkit = { git = "https://github.com/OpenADMET/openadmet-toolkit.git", branch = "main" }
molfeat = { git = "https://github.com/OpenADMET/molfeat.git", branch = "main" }
# The neural-pairwise-regression repo builds a distribution named `nepare` (imported by the pairwise featurizer).
nepare = { git = "https://github.com/JacksonBurns/neural-pairwise-regression.git" }
useful-rdkit-utils = { git = "https://github.com/PatWalters/useful_rdkit_utils.git", branch = "master" }

# Isolated env for the admetlab3 adapter - a CODE-API (web-service) model, not a local package.
#
# ADMETlab 3.0 is a REMOTE service (https://admetlab3.scbdd.com): there is no model to load and no CUDA,
# so this "env" is deliberately minimal. The adapter (run.py) speaks HTTP with the Python STANDARD LIBRARY
# only (urllib + csv + json), so no third-party HTTP client is needed and the mocked unit test runs in the
# core env with no extra deps. ONE ENV PER MODEL is still honored (CLAUDE.md §0/§3) so dispatch can invoke
# `pixi run --manifest-path endpoints/triage/admetlab3/pixi.toml python run.py ...` uniformly.
#
# NO box-solved lock is required for this task: api-model kind (CLAUDE.md §5) is client + retry + cache +
# placeholder schema + mocked test. The one remaining live step (capturing the literal 119-column header)
# is a network call, not an env resolution, and is filed as `needs_aaran` (F-6), not BLOCKED.
[workspace]
name = "admetlab3"
version = "0.1.0"
description = "ADMETlab 3.0 web-API adapter (triage home; cross-cutting to herg/metabolism/distribution/ppb/toxicity/permeability)"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = "3.11.*"   # stdlib urllib/csv/json only; no third-party HTTP client
